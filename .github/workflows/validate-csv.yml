name: Validate CSV

on:
  pull_request:
    paths:
      - 'data/projects.csv'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Validate projects.csv
        run: node scripts/validate_csv.mjs
